# Exemplo de arquivo de configuração para o provedor SunPKCS11
# Este arquivo informa ao Java como encontrar e usar a biblioteca nativa do HSM.
name = SoftHSM

# O caminho para a biblioteca deve ser ajustado para o seu sistema operacional.
# Linux (exemplo): library = /usr/lib/x86_64-linux-gnu/softhsm/libsofthsm2.so
# macOS (Homebrew, exemplo): library = /opt/homebrew/lib/softhsm/libsofthsm2.so
# Windows (exemplo): library = C:/SoftHSM2/lib/softhsm2.dll