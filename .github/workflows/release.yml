name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

  build:
    name: Build Binaries with Version
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Create dist directory
        run: mkdir -p dist

      - name: Get version from tag
        id: tag_name
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build for Linux amd64
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.tag_name.outputs.VERSION }}" -o dist/assinatura-${{ steps.tag_name.outputs.VERSION }}-linux-amd64 ./cmd/assinatura

      - name: Build for Windows amd64
        run: GOOS=windows GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.tag_name.outputs.VERSION }}" -o dist/assinatura-${{ steps.tag_name.outputs.VERSION }}-windows-amd64.exe ./cmd/assinatura

      - name: Build for macOS amd64
        run: GOOS=darwin GOARCH=amd64 go build -ldflags "-X main.version=${{ steps.tag_name.outputs.VERSION }}" -o dist/assinatura-${{ steps.tag_name.outputs.VERSION }}-darwin-amd64 ./cmd/assinatura

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
